name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate variables
        env:
          WHATSAPP_NUMBER: ${{ vars.WHATSAPP_NUMBER }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          SITE_URL: ${{ vars.SITE_URL }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          CITY_NAME: ${{ vars.CITY_NAME }}
          PRICE_ONE_VISIT: ${{ vars.PRICE_ONE_VISIT }}
          PRICE_TWO_VISITS: ${{ vars.PRICE_TWO_VISITS }}
          DOG_WALK_PRICE_FROM: ${{ vars.DOG_WALK_PRICE_FROM }}
        run: |
          required_vars=(
            WHATSAPP_NUMBER
            BRAND_NAME
            SITE_URL
            CONTACT_EMAIL
            CITY_NAME
            PRICE_ONE_VISIT
            PRICE_TWO_VISITS
            DOG_WALK_PRICE_FROM
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing repository/environment variable: ${var_name}"
              exit 1
            fi
          done

          for n in PRICE_ONE_VISIT PRICE_TWO_VISITS DOG_WALK_PRICE_FROM; do
            value="${!n}"
            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "${n} must be numeric"
              exit 1
            fi
          done

      - name: Build site with injected variables
        run: |
          mkdir -p site
          rsync -av --exclude='.git' --exclude='.github' --exclude='site' ./ site/

          for f in site/index.html site/facturen.html site/account.html; do
            sed -i "s|__WHATSAPP_NUMBER__|${{ vars.WHATSAPP_NUMBER }}|g" "$f"
            sed -i "s|__BRAND_NAME__|${{ vars.BRAND_NAME }}|g" "$f"
            sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" "$f"
            sed -i "s|__CONTACT_EMAIL__|${{ vars.CONTACT_EMAIL }}|g" "$f"
            sed -i "s|__CITY_NAME__|${{ vars.CITY_NAME }}|g" "$f"
            sed -i "s|__PRICE_ONE_VISIT__|${{ vars.PRICE_ONE_VISIT }}|g" "$f"
            sed -i "s|__PRICE_TWO_VISITS__|${{ vars.PRICE_TWO_VISITS }}|g" "$f"
            sed -i "s|__DOG_WALK_PRICE_FROM__|${{ vars.DOG_WALK_PRICE_FROM }}|g" "$f"
            sed -i "s|__ENV_LABEL__|${{ vars.ENV_LABEL }}|g" "$f"
          done

          sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" site/robots.txt
          sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" site/sitemap.xml

      - name: Generate js/config.js with runtime constants
        run: |
          cat > site/js/config.js <<JSEOF
          window.GATOWEB_CONFIG = {
            SUPABASE_URL: $(jq -Rn --arg v "${{ vars.SUPABASE_URL }}" '$v'),
            SUPABASE_ANON_KEY: $(jq -Rn --arg v "${{ vars.SUPABASE_ANON_KEY }}" '$v'),
            BUSINESS_LEGAL_NAME: $(jq -Rn --arg v "${{ vars.BUSINESS_LEGAL_NAME }}" '$v'),
            BUSINESS_ADDRESS: $(jq -Rn --arg v "${{ vars.BUSINESS_ADDRESS }}" '$v'),
            KVK_NUMBER: $(jq -Rn --arg v "${{ vars.KVK_NUMBER }}" '$v'),
            IBAN_NUMBER: $(jq -Rn --arg v "${{ vars.IBAN_NUMBER }}" '$v'),
            BTW_EXEMPT: $(jq -Rn --arg v "${{ vars.BTW_EXEMPT }}" '$v'),
            BRAND_NAME: $(jq -Rn --arg v "${{ vars.BRAND_NAME }}" '$v'),
            PRICE_ONE_VISIT: ${{ vars.PRICE_ONE_VISIT }},
            PRICE_TWO_VISITS: ${{ vars.PRICE_TWO_VISITS }},
            DOG_WALK_PRICE_FROM: ${{ vars.DOG_WALK_PRICE_FROM }}
          };
          JSEOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
