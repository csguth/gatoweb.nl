name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate variables
        env:
          WHATSAPP_NUMBER: ${{ vars.WHATSAPP_NUMBER }}
          BRAND_NAME: ${{ vars.BRAND_NAME }}
          SITE_URL: ${{ vars.SITE_URL }}
          CONTACT_EMAIL: ${{ vars.CONTACT_EMAIL }}
          CITY_NAME: ${{ vars.CITY_NAME }}
          DEFAULT_LANG: ${{ vars.DEFAULT_LANG }}
          REVIEWS_COUNT_LABEL: ${{ vars.REVIEWS_COUNT_LABEL }}
          PRICE_ONE_VISIT: ${{ vars.PRICE_ONE_VISIT }}
          PRICE_TWO_VISITS: ${{ vars.PRICE_TWO_VISITS }}
          DOG_WALK_PRICE_FROM: ${{ vars.DOG_WALK_PRICE_FROM }}
        run: |
          required_vars=(
            WHATSAPP_NUMBER
            BRAND_NAME
            SITE_URL
            CONTACT_EMAIL
            CITY_NAME
            DEFAULT_LANG
            REVIEWS_COUNT_LABEL
            PRICE_ONE_VISIT
            PRICE_TWO_VISITS
            DOG_WALK_PRICE_FROM
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing repository/environment variable: ${var_name}"
              exit 1
            fi
          done

          case "$DEFAULT_LANG" in
            en|nl) ;;
            *)
              echo "DEFAULT_LANG must be 'en' or 'nl'"
              exit 1
              ;;
          esac

          for n in PRICE_ONE_VISIT PRICE_TWO_VISITS DOG_WALK_PRICE_FROM; do
            value="${!n}"
            if ! [[ "$value" =~ ^[0-9]+$ ]]; then
              echo "${n} must be numeric"
              exit 1
            fi
          done

      - name: Build site with injected variables
        run: |
          mkdir -p site
          rsync -av --exclude='.git' --exclude='.github' --exclude='site' ./ site/

          sed -i "s|__WHATSAPP_NUMBER__|${{ vars.WHATSAPP_NUMBER }}|g" site/index.html
          sed -i "s|__BRAND_NAME__|${{ vars.BRAND_NAME }}|g" site/index.html
          sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" site/index.html
          sed -i "s|__CONTACT_EMAIL__|${{ vars.CONTACT_EMAIL }}|g" site/index.html
          sed -i "s|__CITY_NAME__|${{ vars.CITY_NAME }}|g" site/index.html
          sed -i "s|__DEFAULT_LANG__|${{ vars.DEFAULT_LANG }}|g" site/index.html
          sed -i "s|__REVIEWS_COUNT_LABEL__|${{ vars.REVIEWS_COUNT_LABEL }}|g" site/index.html
          sed -i "s|__PRICE_ONE_VISIT__|${{ vars.PRICE_ONE_VISIT }}|g" site/index.html
          sed -i "s|__PRICE_TWO_VISITS__|${{ vars.PRICE_TWO_VISITS }}|g" site/index.html
          sed -i "s|__DOG_WALK_PRICE_FROM__|${{ vars.DOG_WALK_PRICE_FROM }}|g" site/index.html

          sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" site/robots.txt
          sed -i "s|__SITE_URL__|${{ vars.SITE_URL }}|g" site/sitemap.xml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
