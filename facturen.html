<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturen — __BRAND_NAME__</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="images/favicon.png" type="image/png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sage: {
              50:  '#f5f5f4', 100: '#e7e6e3', 200: '#c8c6c0', 300: '#a3a099',
              400: '#726e64', 500: '#453f34', 600: '#221f19', 700: '#141210',
              800: '#0a0908', 900: '#000000',
            },
            warm: {
              50:  '#faf7f0', 100: '#f2ebd9', 200: '#eee8dc', 300: '#e0cba0',
              400: '#f8974a', 500: '#fa7d18', 600: '#e2620a', 700: '#bb4a09',
              800: '#943a0f', 900: '#78320f',
            },
          },
        },
      },
    };
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    html { font-family: 'Inter', system-ui, sans-serif; }
    body { background: #faf7f0; }
    /* Bilingual toggle — body.show-nl switches to Dutch (shared with index.html) */
    .nl-l { display: none; }
    body.show-nl .en-l { display: none; }
    body.show-nl .nl-l { display: revert; }
  </style>
</head>
<body class="min-h-screen"
  x-data="{ lang: localStorage.getItem('gatoweb_lang') || (navigator.language.startsWith('nl') ? 'nl' : 'en') }"
  x-init="
    document.body.classList.toggle('show-nl', lang === 'nl');
    $watch('lang', val => {
      document.body.classList.toggle('show-nl', val === 'nl');
      localStorage.setItem('gatoweb_lang', val);
    });
  ">

  <div class="max-w-lg mx-auto px-5 py-10" x-data="facturenApp()" x-init="init()">

    <div class="flex items-center justify-between mb-6">
      <h1 class="font-serif text-2xl font-bold text-sage-700">🐾 Facturen</h1>
      <button
        @click="lang = lang === 'en' ? 'nl' : 'en'"
        class="text-xs font-semibold border border-sage-200 rounded-full px-3 py-1.5 text-sage-600 hover:bg-sage-50 transition select-none"
        aria-label="Switch language"
      >
        <span class="nl-l">🇳🇱 NL</span>
        <span class="en-l">🇬🇧 EN</span>
      </button>
    </div>

    <template x-if="!configured">
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm">
        <span class="nl-l">Supabase is nog niet geconfigureerd. Voeg de repository variables
        <code>SUPABASE_URL</code> en <code>SUPABASE_ANON_KEY</code> toe en deploy opnieuw.</span>
        <span class="en-l">Supabase is not configured yet. Add the repository variables
        <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> and redeploy.</span>
      </div>
    </template>

    <template x-if="configured && !session">
      <form @submit.prevent="login()" class="bg-white rounded-2xl p-6 space-y-4 shadow-sm border border-warm-200">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            <span class="nl-l">E-mail</span><span class="en-l">Email</span>
          </label>
          <input type="email" x-model="email" required autocomplete="username"
                 class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            <span class="nl-l">Wachtwoord</span><span class="en-l">Password</span>
          </label>
          <input type="password" x-model="password" required autocomplete="current-password"
                 class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
        </div>
        <p x-show="loginError" x-text="loginError" class="text-red-600 text-xs"></p>
        <button type="submit" :disabled="loading"
                class="w-full bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white font-semibold py-3 rounded-xl text-sm transition">
          <span x-show="!loading"><span class="nl-l">Inloggen</span><span class="en-l">Log in</span></span>
          <span x-show="loading"><span class="nl-l">Bezig...</span><span class="en-l">Working...</span></span>
        </button>
      </form>
    </template>

    <template x-if="configured && session">
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <p class="text-xs text-gray-500" x-text="session.user.email"></p>
          <div class="flex gap-3">
            <button @click="loadBookings()" class="text-xs text-sage-600 font-semibold hover:text-sage-700">
              <span class="nl-l">↻ Vernieuwen</span><span class="en-l">↻ Refresh</span>
            </button>
            <button @click="logout()" class="text-xs text-gray-400 hover:text-red-500">
              <span class="nl-l">Uitloggen</span><span class="en-l">Log out</span>
            </button>
          </div>
        </div>

        <p x-show="loadingList" class="text-sm text-gray-400 text-center py-10">
          <span class="nl-l">Laden...</span><span class="en-l">Loading...</span>
        </p>
        <p x-show="!loadingList && bookings.length === 0" class="text-sm text-gray-400 text-center py-10">
          <span class="nl-l">Geen facturen 🎉</span><span class="en-l">No invoices 🎉</span>
        </p>

        <template x-for="b in bookings" :key="b.id">
          <div class="bg-white rounded-2xl p-4 shadow-sm space-y-3 border"
               :class="{
                 'border-warm-200': b.status === 'pending',
                 'border-orange-300': b.status === 'approved' && !b.tikkie_sent,
                 'border-warm-200 opacity-70': b.status === 'approved' && b.tikkie_sent,
                 'border-gray-200 opacity-50': b.status === 'cancelled'
               }">

            <div class="flex items-center justify-between gap-2">
              <span class="text-[10px] font-bold uppercase tracking-wide px-2 py-1 rounded-full"
                    :class="{
                      'bg-amber-100 text-amber-700': b.status === 'pending',
                      'bg-orange-100 text-orange-700': b.status === 'approved' && !b.tikkie_sent,
                      'bg-green-100 text-green-700': b.status === 'approved' && b.tikkie_sent,
                      'bg-gray-100 text-gray-500': b.status === 'cancelled'
                    }">
                <template x-if="b.status === 'pending'"><span><span class="nl-l">Wacht op goedkeuring</span><span class="en-l">Awaiting approval</span></span></template>
                <template x-if="b.status === 'approved' && !b.tikkie_sent"><span><span class="nl-l">Tikkie versturen</span><span class="en-l">Send Tikkie</span></span></template>
                <template x-if="b.status === 'approved' && b.tikkie_sent"><span><span class="nl-l">Voltooid</span><span class="en-l">Completed</span></span></template>
                <template x-if="b.status === 'cancelled'"><span><span class="nl-l">Geannuleerd</span><span class="en-l">Cancelled</span></span></template>
              </span>
              <span x-show="b.factuur_number" class="text-[11px] text-gray-400" x-text="'#' + factuurLabel(b)"></span>
            </div>

            <template x-if="b.status === 'pending'">
              <div class="space-y-3">
                <div>
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide">
                    <span class="nl-l">Klant</span><span class="en-l">Client</span>
                  </label>
                  <input type="text" x-model="b.client_name" :placeholder="lang === 'nl' ? 'Naam klant' : 'Client name'"
                         class="w-full border border-warm-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
                </div>
                <div class="text-sm text-gray-600 space-y-0.5">
                  <div><span class="font-semibold nl-l">Data:</span><span class="font-semibold en-l">Dates:</span> <span x-text="b.date_from"></span><template x-if="b.date_to"><span> → <span x-text="b.date_to"></span></span></template></div>
                  <div><span class="font-semibold nl-l">Huisdieren:</span><span class="font-semibold en-l">Pets:</span> <span x-text="petsSummary(b.pets)"></span></div>
                  <div><span class="font-semibold nl-l">Voorkeur:</span><span class="font-semibold en-l">Preference:</span> <span x-text="b.preference || '-'"></span></div>
                </div>
                <div>
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide">
                    <span class="nl-l">Bedrag (€)</span><span class="en-l">Amount (€)</span>
                  </label>
                  <input type="number" step="0.01" x-model.number="b.final_amount"
                         class="w-full border border-warm-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
                </div>
                <button @click="approve(b)" :disabled="b._busy"
                        class="w-full bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white text-sm font-semibold py-2.5 rounded-xl transition">
                  <span x-show="!b._busy"><span class="nl-l">Goedkeuren & Factuur genereren</span><span class="en-l">Approve & generate Invoice</span></span>
                  <span x-show="b._busy"><span class="nl-l">Bezig...</span><span class="en-l">Working...</span></span>
                </button>
              </div>
            </template>

            <template x-if="b.status !== 'pending'">
              <div class="space-y-2">
                <div class="text-sm text-gray-700 font-semibold" x-text="b.client_name || '-'"></div>
                <div class="text-sm text-gray-600 space-y-0.5">
                  <div><span class="font-semibold nl-l">Data:</span><span class="font-semibold en-l">Dates:</span> <span x-text="b.date_from"></span><template x-if="b.date_to"><span> → <span x-text="b.date_to"></span></span></template></div>
                  <div><span class="font-semibold nl-l">Huisdieren:</span><span class="font-semibold en-l">Pets:</span> <span x-text="petsSummary(b.pets)"></span></div>
                  <div><span class="font-semibold nl-l">Bedrag:</span><span class="font-semibold en-l">Amount:</span> € <span x-text="Number(b.final_amount || 0).toFixed(2)"></span></div>
                </div>
                <template x-if="b.status === 'approved'">
                  <div class="flex gap-2 pt-1">
                    <button @click="downloadPdf(b)"
                            class="flex-1 border border-sage-300 text-sage-700 hover:bg-sage-50 text-xs font-semibold py-2 rounded-xl transition">
                      <span class="nl-l">📄 PDF downloaden</span><span class="en-l">📄 Download PDF</span>
                    </button>
                    <button x-show="!b.tikkie_sent" @click="markTikkieSent(b)" :disabled="b._busy"
                            class="flex-1 bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white text-xs font-semibold py-2 rounded-xl transition">
                      <span class="nl-l">✓ Tikkie verstuurd</span><span class="en-l">✓ Tikkie sent</span>
                    </button>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = '__SUPABASE_URL__';
    const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';
    const BUSINESS_LEGAL_NAME = '__BUSINESS_LEGAL_NAME__';
    const BUSINESS_ADDRESS = '__BUSINESS_ADDRESS__';
    const KVK_NUMBER = '__KVK_NUMBER__';
    const IBAN_NUMBER = '__IBAN_NUMBER__';
    const BTW_EXEMPT = '__BTW_EXEMPT__';

    const configured = Boolean(
      SUPABASE_URL && !SUPABASE_URL.startsWith('__') &&
      SUPABASE_ANON_KEY && !SUPABASE_ANON_KEY.startsWith('__')
    );

    // Session persistence: this is a static site with no server, so there's no way to
    // set an httpOnly cookie — Supabase's own localStorage-backed session is the standard,
    // supported approach here. We keep the session in its own storage key (not shared with
    // any other app on this origin), let the SDK auto-refresh the access token, and never
    // render booking data into raw HTML (only Alpine's text bindings), which keeps XSS-based
    // token theft very unlikely. Data exposure is further bounded by the RLS policies in
    // supabase/schema.sql (only the authenticated user can read/write bookings).
    const supabase = configured ? createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: false,
        storage: window.localStorage,
        storageKey: 'gatoweb-facturen-auth'
      }
    }) : null;

    function petsText(pets) {
      if (!Array.isArray(pets)) return '-';
      return pets.map(p => (p.name ? p.name + ' (' + (p.otherType || p.type) + ')' : (p.otherType || p.type))).join(', ');
    }

    function factuurNumberLabel(n, referenceDate) {
      const year = new Date(referenceDate || Date.now()).getFullYear();
      return year + '-' + String(n).padStart(4, '0');
    }

    // Priority order for the list: things Ligia still needs to act on come first —
    // 0) pending bookings waiting for approval, 1) approved invoices whose Tikkie
    // payment request still needs to be created/sent, 2) approved+Tikkie-sent
    // (done, informational only), 3) cancelled (informational only).
    function priorityOf(b) {
      if (b.status === 'pending') return 0;
      if (b.status === 'approved' && !b.tikkie_sent) return 1;
      if (b.status === 'approved' && b.tikkie_sent) return 2;
      return 3;
    }

    function sortBookings(list) {
      return list.slice().sort((a, b) => {
        const pa = priorityOf(a), pb = priorityOf(b);
        if (pa !== pb) return pa - pb;
        return new Date(a.created_at) - new Date(b.created_at);
      });
    }

    function generatePdf(b) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      let y = 20;

      doc.setFontSize(16);
      doc.text(BUSINESS_LEGAL_NAME || '__BRAND_NAME__', 20, y); y += 8;
      doc.setFontSize(10);
      if (BUSINESS_ADDRESS) { doc.text(BUSINESS_ADDRESS, 20, y); y += 5; }
      if (KVK_NUMBER) { doc.text('KVK: ' + KVK_NUMBER, 20, y); y += 5; }
      y += 5;

      doc.setFontSize(14);
      doc.text('Factuur ' + factuurNumberLabel(b.factuur_number, b.approved_at), 20, y); y += 8;
      doc.setFontSize(10);
      doc.text('Datum: ' + new Date(b.approved_at || Date.now()).toLocaleDateString('nl-NL'), 20, y); y += 10;

      doc.text('Klant: ' + (b.client_name || '-'), 20, y); y += 10;

      doc.text('Omschrijving:', 20, y); y += 6;
      doc.text('Catsitting/oppasdiensten ' + b.date_from + (b.date_to ? ' t/m ' + b.date_to : ''), 20, y); y += 6;
      doc.text('Huisdieren: ' + petsText(b.pets), 20, y); y += 6;
      if (b.preference) { doc.text('Voorkeur: ' + b.preference, 20, y); y += 6; }
      y += 6;

      doc.setFontSize(12);
      doc.text('Totaal: € ' + Number(b.final_amount).toFixed(2), 20, y); y += 10;

      doc.setFontSize(9);
      if (BTW_EXEMPT === 'true') {
        doc.text('Vrijgesteld van BTW op grond van de kleineondernemersregeling (KOR).', 20, y); y += 6;
      }
      if (IBAN_NUMBER) { doc.text('Betaling: via Tikkie (apart verzonden) — IBAN ' + IBAN_NUMBER, 20, y); y += 6; }

      doc.save('factuur-' + factuurNumberLabel(b.factuur_number, b.approved_at) + '.pdf');
    }

    window.facturenApp = function () {
      return {
        configured,
        session: null,
        email: '',
        password: '',
        loginError: '',
        loading: false,
        loadingList: false,
        bookings: [],

        async init() {
          if (!configured) return;
          const { data } = await supabase.auth.getSession();
          this.session = data.session;
          supabase.auth.onAuthStateChange((_event, session) => { this.session = session; });
          if (this.session) this.loadBookings();
        },

        async login() {
          this.loading = true;
          this.loginError = '';
          const { data, error } = await supabase.auth.signInWithPassword({ email: this.email, password: this.password });
          this.loading = false;
          if (error) { this.loginError = error.message; return; }
          this.session = data.session;
          this.password = '';
          this.loadBookings();
        },

        async logout() {
          await supabase.auth.signOut();
          this.session = null;
          this.bookings = [];
        },

        async loadBookings() {
          this.loadingList = true;
          const { data, error } = await supabase
            .from('bookings')
            .select('*')
            .order('created_at', { ascending: true });
          this.loadingList = false;
          if (error) { alert(error.message); return; }
          this.bookings = sortBookings((data || []).map(b => ({ ...b, final_amount: b.final_amount ?? b.suggested_amount ?? 0, _busy: false })));
        },

        petsSummary(pets) {
          return petsText(pets);
        },

        factuurLabel(b) {
          return factuurNumberLabel(b.factuur_number, b.approved_at);
        },

        downloadPdf(b) {
          generatePdf(b);
        },

        async markTikkieSent(b) {
          b._busy = true;
          const { error } = await supabase.from('bookings').update({ tikkie_sent: true }).eq('id', b.id);
          b._busy = false;
          if (error) { alert(error.message); return; }
          b.tikkie_sent = true;
          this.bookings = sortBookings(this.bookings);
        },

        async approve(b) {
          const isNl = document.body.classList.contains('show-nl');
          const confirmMsg = isNl
            ? 'Factuur definitief goedkeuren voor ' + (b.client_name || 'deze klant') + '?'
            : 'Permanently approve the invoice for ' + (b.client_name || 'this client') + '?';
          if (!confirm(confirmMsg)) return;
          b._busy = true;

          if (b.client_name) {
            await supabase.from('bookings').update({ client_name: b.client_name }).eq('id', b.id);
          }

          const { data, error } = await supabase.rpc('approve_booking', {
            p_booking_id: b.id,
            p_final_amount: b.final_amount
          });

          b._busy = false;
          if (error) { alert(error.message); return; }

          const approved = Array.isArray(data) ? data[0] : data;
          const merged = { ...b, ...approved, client_name: b.client_name, tikkie_sent: false, _busy: false };
          const idx = this.bookings.findIndex(x => x.id === b.id);
          if (idx !== -1) this.bookings.splice(idx, 1, merged);
          this.bookings = sortBookings(this.bookings);
          generatePdf(merged);
        }
      };
    };
  </script>

  <!-- Alpine must load after the module script above so window.facturenApp already exists
       when Alpine scans and evaluates x-data on the page. -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
