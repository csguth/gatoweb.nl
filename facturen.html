<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facturen — __BRAND_NAME__</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="images/favicon.png" type="image/png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/tailwind-config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <!-- Runtime config (Supabase URL/keys, business info) injected at deploy time -->
  <script src="js/config.js"></script>
  <script src="js/lang-toggle.js"></script>

  <link rel="stylesheet" href="css/site.css" />
</head>
<body class="min-h-screen" data-env="__ENV_LABEL__"
  x-data="langToggle()" x-init="init()">

  <div id="env-banner" class="fixed top-0 inset-x-0 z-[100] bg-amber-400 text-black text-xs md:text-sm font-bold text-center py-1.5">
    🚧 STAGING — <span class="en-l">test environment, not the live site</span><span class="nl-l">testomgeving, niet de live site</span>
  </div>

  <div class="max-w-lg mx-auto px-5 py-10" x-data="facturenApp()" x-init="init()">

    <div class="flex items-center justify-between mb-6">
      <h1 class="font-serif text-2xl font-bold text-sage-700">🐾 Facturen</h1>
      <button
        @click="lang = lang === 'en' ? 'nl' : 'en'"
        class="text-xs font-semibold border border-sage-200 rounded-full px-3 py-1.5 text-sage-600 hover:bg-sage-50 transition select-none"
        aria-label="Switch language"
      >
        <span class="nl-l">🇳🇱 NL</span>
        <span class="en-l">🇬🇧 EN</span>
      </button>
    </div>

    <template x-if="!configured">
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl p-4 text-sm">
        <span class="nl-l">Supabase is nog niet geconfigureerd. Voeg de repository variables
        <code>SUPABASE_URL</code> en <code>SUPABASE_ANON_KEY</code> toe en deploy opnieuw.</span>
        <span class="en-l">Supabase is not configured yet. Add the repository variables
        <code>SUPABASE_URL</code> and <code>SUPABASE_ANON_KEY</code> and redeploy.</span>
      </div>
    </template>

    <template x-if="configured && !session">
      <form @submit.prevent="login()" class="bg-white rounded-2xl p-6 space-y-4 shadow-sm border border-warm-200">
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            <span class="nl-l">E-mail</span><span class="en-l">Email</span>
          </label>
          <input type="email" x-model="email" required autocomplete="username"
                 class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">
            <span class="nl-l">Wachtwoord</span><span class="en-l">Password</span>
          </label>
          <input type="password" x-model="password" required autocomplete="current-password"
                 class="w-full border border-warm-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
        </div>
        <p x-show="loginError" x-text="loginError" class="text-red-600 text-xs"></p>
        <button type="submit" :disabled="loading"
                class="w-full bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white font-semibold py-3 rounded-xl text-sm transition">
          <span x-show="!loading"><span class="nl-l">Inloggen</span><span class="en-l">Log in</span></span>
          <span x-show="loading"><span class="nl-l">Bezig...</span><span class="en-l">Working...</span></span>
        </button>
      </form>
    </template>

    <template x-if="configured && session">
      <div class="space-y-4">
        <div class="flex justify-between items-center">
          <p class="text-xs text-gray-500" x-text="session.user.email"></p>
          <div class="flex gap-3">
            <button @click="loadBookings()" class="text-xs text-sage-600 font-semibold hover:text-sage-700">
              <span class="nl-l">↻ Vernieuwen</span><span class="en-l">↻ Refresh</span>
            </button>
            <button @click="logout()" class="text-xs text-gray-400 hover:text-red-500">
              <span class="nl-l">Uitloggen</span><span class="en-l">Log out</span>
            </button>
          </div>
        </div>

        <p x-show="loadingList" class="text-sm text-gray-400 text-center py-10">
          <span class="nl-l">Laden...</span><span class="en-l">Loading...</span>
        </p>
        <p x-show="!loadingList && bookings.length === 0" class="text-sm text-gray-400 text-center py-10">
          <span class="nl-l">Geen facturen 🎉</span><span class="en-l">No invoices 🎉</span>
        </p>

        <template x-for="b in bookings" :key="b.id">
          <div class="bg-white rounded-2xl p-4 shadow-sm space-y-3 border"
               :class="{
                 'border-warm-200': b.status === 'pending',
                 'border-orange-300': b.status === 'approved' && !b.tikkie_sent,
                 'border-warm-200 opacity-70': b.status === 'approved' && b.tikkie_sent,
                 'border-gray-200 opacity-50': b.status === 'cancelled'
               }">

            <div class="flex items-center justify-between gap-2">
              <span class="text-[10px] font-bold uppercase tracking-wide px-2 py-1 rounded-full"
                    :class="{
                      'bg-amber-100 text-amber-700': b.status === 'pending',
                      'bg-orange-100 text-orange-700': b.status === 'approved' && !b.tikkie_sent,
                      'bg-green-100 text-green-700': b.status === 'approved' && b.tikkie_sent,
                      'bg-gray-100 text-gray-500': b.status === 'cancelled'
                    }">
                <template x-if="b.status === 'pending'"><span><span class="nl-l">Wacht op goedkeuring</span><span class="en-l">Awaiting approval</span></span></template>
                <template x-if="b.status === 'approved' && !b.tikkie_sent"><span><span class="nl-l">Tikkie versturen</span><span class="en-l">Send Tikkie</span></span></template>
                <template x-if="b.status === 'approved' && b.tikkie_sent"><span><span class="nl-l">Voltooid</span><span class="en-l">Completed</span></span></template>
                <template x-if="b.status === 'cancelled'"><span><span class="nl-l">Geannuleerd</span><span class="en-l">Cancelled</span></span></template>
              </span>
              <span x-show="b.factuur_number" class="text-[11px] text-gray-400" x-text="'#' + factuurLabel(b)"></span>
            </div>

            <template x-if="b.status === 'pending'">
              <div class="space-y-3">
                <div>
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide">
                    <span class="nl-l">Klant</span><span class="en-l">Client</span>
                  </label>
                  <input type="text" x-model="b.client_name" :placeholder="lang === 'nl' ? 'Naam klant' : 'Client name'"
                         class="w-full border border-warm-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
                </div>
                <div class="text-sm text-gray-600 space-y-0.5">
                  <div><span class="font-semibold nl-l">Data:</span><span class="font-semibold en-l">Dates:</span> <span x-text="b.date_from"></span><template x-if="b.date_to"><span> → <span x-text="b.date_to"></span></span></template></div>
                  <div><span class="font-semibold nl-l">Huisdieren:</span><span class="font-semibold en-l">Pets:</span> <span x-text="petsSummary(b.pets)"></span></div>
                  <div><span class="font-semibold nl-l">Voorkeur:</span><span class="font-semibold en-l">Preference:</span> <span x-text="b.preference || '-'"></span></div>
                </div>
                <div>
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide">
                    <span class="nl-l">Bedrag (€)</span><span class="en-l">Amount (€)</span>
                  </label>
                  <input type="number" step="0.01" x-model.number="b.final_amount"
                         class="w-full border border-warm-200 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-sage-400" />
                </div>
                <button @click="approve(b)" :disabled="b._busy"
                        class="w-full bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white text-sm font-semibold py-2.5 rounded-xl transition">
                  <span x-show="!b._busy"><span class="nl-l">Goedkeuren & Factuur genereren</span><span class="en-l">Approve & generate Invoice</span></span>
                  <span x-show="b._busy"><span class="nl-l">Bezig...</span><span class="en-l">Working...</span></span>
                </button>
              </div>
            </template>

            <template x-if="b.status !== 'pending'">
              <div class="space-y-2">
                <div class="text-sm text-gray-700 font-semibold" x-text="b.client_name || '-'"></div>
                <div class="text-sm text-gray-600 space-y-0.5">
                  <div><span class="font-semibold nl-l">Data:</span><span class="font-semibold en-l">Dates:</span> <span x-text="b.date_from"></span><template x-if="b.date_to"><span> → <span x-text="b.date_to"></span></span></template></div>
                  <div><span class="font-semibold nl-l">Huisdieren:</span><span class="font-semibold en-l">Pets:</span> <span x-text="petsSummary(b.pets)"></span></div>
                  <div><span class="font-semibold nl-l">Bedrag:</span><span class="font-semibold en-l">Amount:</span> € <span x-text="Number(b.final_amount || 0).toFixed(2)"></span></div>
                </div>
                <template x-if="b.status === 'approved'">
                  <div class="flex gap-2 pt-1">
                    <button @click="downloadPdf(b)"
                            class="flex-1 border border-sage-300 text-sage-700 hover:bg-sage-50 text-xs font-semibold py-2 rounded-xl transition">
                      <span class="nl-l">📄 PDF downloaden</span><span class="en-l">📄 Download PDF</span>
                    </button>
                    <button x-show="!b.tikkie_sent" @click="markTikkieSent(b)" :disabled="b._busy"
                            class="flex-1 bg-sage-600 hover:bg-sage-700 disabled:opacity-50 text-white text-xs font-semibold py-2 rounded-xl transition">
                      <span class="nl-l">✓ Tikkie verstuurd</span><span class="en-l">✓ Tikkie sent</span>
                    </button>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
    </template>

  </div>

  <!-- Ligia's staff-only invoicing app — see js/facturen/facturen-app.js -->
  <script type="module" src="js/facturen/facturen-app.js"></script>

  <!-- Alpine must load after the module script above so window.facturenApp already exists
       when Alpine scans and evaluates x-data on the page. -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

</body>
</html>
